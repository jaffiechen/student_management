<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>学生管理系统</span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li data-page="dashboard" class="active"><i class="fas fa-tachometer-alt"></i> 仪表盘</li>
                <li data-page="user"><i class="fas fa-users"></i> 用户管理</li>
                <li data-page="class"><i class="fas fa-school"></i> 班级管理</li>
                <li data-page="student"><i class="fas fa-user-graduate"></i> 学生管理</li>
                <li data-page="score"><i class="fas fa-chart-line"></i> 成绩管理</li>
                <li data-page="notice"><i class="fas fa-bullhorn"></i> 公告管理</li>
                <li data-page="profile"><i class="fas fa-user-circle"></i> 个人资料</li>
                <li id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出登录</li>
            </ul>
        </aside>
        <main class="content">
            <div class="top-bar">
                <div class="user-info">
                    <i class="fas fa-user"></i>
                    <span id="userRealName"></span>
                    <span class="role-badge" id="userRole"></span>
                </div>
            </div>
            <div id="pageContent">
                <!-- 动态内容 -->
                <div class="loading">加载中...</div>
            </div>
        </main>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
